name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m compileall -q repotrace
      - name: Install
        run: python -m pip install .
      - name: Smoke test
        run: |
          repotrace --help
          repotrace index . --reset
          repotrace overview
          repotrace deps
          repotrace cycles
          repotrace check --no-fail
